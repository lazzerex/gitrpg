version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - gofmt
    - goimports

linters-settings:
  goimports:
    local-prefixes: github.com/lazzerex/gitrpg

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
