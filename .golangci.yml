version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/lazzerex/gitrpg
