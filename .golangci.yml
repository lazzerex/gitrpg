version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/lazzerex/gitrpg

issues:
  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - errcheck
