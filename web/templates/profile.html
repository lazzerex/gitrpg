{{template "base.html" .}}

{{define "title"}}Profile — GitHub RPG{{end}}

{{define "content"}}
<div class="max-w-6xl mx-auto px-4 py-16">
    <h1 class="text-3xl font-bold text-white mb-2">{{.User.Login}}</h1>

    <p class="text-gray-500 text-sm">Character generation coming soon.</p>
</div>
{{end}}
