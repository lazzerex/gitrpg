{{template "base.html" .}}

{{define "title"}}Card Generator — GitHub RPG{{end}}

{{define "content"}}
<div class="max-w-2xl mx-auto px-4 py-12">

    <div class="text-center mb-10">
        <h1 class="text-3xl font-bold text-white mb-2">Card Generator</h1>
        <p class="text-gray-400">Preview any GitHub RPG card and copy the README snippet.</p>
    </div>

    <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 mb-6">
        <div class="flex gap-3">
            <input
                id="username-input"
                type="text"
                placeholder="GitHub username"
                class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-gray-500"
                autocomplete="off"
                spellcheck="false"
            >
            <button
                onclick="previewCard()"
                class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2 rounded-lg text-sm font-medium transition-colors"
            >
                Preview
            </button>
        </div>
    </div>

    <div id="preview-section" class="hidden">

        <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 mb-6">
            <p class="text-xs text-gray-500 uppercase tracking-widest mb-4">Full Card</p>
            <img id="card-full" src="" alt="character card" class="w-full rounded mb-4">
            <div class="bg-gray-800 rounded p-3 flex items-center justify-between gap-3">
                <code id="snippet-full" class="text-xs text-gray-300 break-all flex-1"></code>
                <button onclick="copySnippet('snippet-full', this)" class="text-xs bg-gray-700 hover:bg-gray-600 text-gray-300 px-3 py-1.5 rounded transition-colors shrink-0">
                    Copy
                </button>
            </div>
        </div>

        <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 mb-6">
            <p class="text-xs text-gray-500 uppercase tracking-widest mb-4">Compact Card</p>
            <img id="card-compact" src="" alt="compact card" class="rounded mb-4">
            <div class="bg-gray-800 rounded p-3 flex items-center justify-between gap-3">
                <code id="snippet-compact" class="text-xs text-gray-300 break-all flex-1"></code>
                <button onclick="copySnippet('snippet-compact', this)" class="text-xs bg-gray-700 hover:bg-gray-600 text-gray-300 px-3 py-1.5 rounded transition-colors shrink-0">
                    Copy
                </button>
            </div>
        </div>

        <div class="text-center">
            <a id="profile-link" href="#" class="text-sm text-gray-400 hover:text-white transition-colors">
                View full profile →
            </a>
        </div>

    </div>

</div>

<script>
function previewCard() {
    var username = document.getElementById('username-input').value.trim();
    if (!username) return;

    var origin = window.location.origin;
    var section = document.getElementById('preview-section');

    document.getElementById('card-full').src = '/card/' + username + '.svg?t=' + Date.now();
    document.getElementById('card-compact').src = '/card/compact/' + username + '.svg?t=' + Date.now();

    document.getElementById('snippet-full').textContent =
        '![GitHub RPG](' + origin + '/card/' + username + '.svg)';
    document.getElementById('snippet-compact').textContent =
        '![GitHub RPG](' + origin + '/card/compact/' + username + '.svg)';

    document.getElementById('profile-link').href = '/u/' + username;

    section.classList.remove('hidden');
}

function copySnippet(id, btn) {
    var text = document.getElementById(id).textContent;
    navigator.clipboard.writeText(text).then(function () {
        var orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(function () { btn.textContent = orig; }, 1500);
    });
}

document.getElementById('username-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') previewCard();
});
</script>
{{end}}
